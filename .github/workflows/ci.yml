name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --all-targets
      - run: cargo run -p a3s-oci-cli -- features
      - if: runner.os == 'macOS'
        name: Hypervisor.framework VM object lifecycle
        shell: bash
        run: |
          smoke="$RUNNER_TEMP/a3s-oci-hvf-smoke"
          cp target/debug/a3s-oci "$smoke"
          codesign --force --sign - \
            --entitlements packaging/macos/a3s-oci-hvf.entitlements \
            "$smoke"
          codesign --verify --strict "$smoke"

          set +e
          output="$("$smoke" hvf-smoke)"
          status=$?
          set -e
          printf '%s\n' "$output"

          support="$(sysctl -n kern.hv_support 2>/dev/null || printf unavailable)"
          if [[ "$support" == "1" ]]; then
            test "$status" -eq 0
            jq --exit-status \
              '.status == "available" and .vm_created and .vm_destroyed' \
              <<<"$output" >/dev/null
          else
            test "$status" -eq 2
            jq --exit-status \
              '.status == "unavailable" and (.vm_created | not) and (.vm_destroyed | not)' \
              <<<"$output" >/dev/null
          fi
      - if: runner.os == 'macOS'
        name: Isolated libkrun context lifecycle
        shell: bash
        run: |
          smoke_dir="$RUNNER_TEMP/a3s-oci-krun-context"
          mkdir -p "$smoke_dir"
          cp target/debug/a3s-oci-krun-shim "$smoke_dir/"
          cp -R target/debug/a3s-oci-krun-runtime "$smoke_dir/"

          codesign --verify --strict \
            "$smoke_dir/a3s-oci-krun-runtime/libkrun.1.17.0.dylib"
          codesign --verify --strict \
            "$smoke_dir/a3s-oci-krun-runtime/libkrunfw.5.dylib"
          codesign --force --sign - \
            --entitlements packaging/macos/a3s-oci-hvf.entitlements \
            "$smoke_dir/a3s-oci-krun-shim"
          codesign --verify --strict "$smoke_dir/a3s-oci-krun-shim"

          output="$("$smoke_dir/a3s-oci-krun-shim" context-smoke)"
          printf '%s\n' "$output"
          jq --exit-status \
            '.platform == "macos" and .status == "available"
             and .runtime_bundle_loaded and .context_created
             and .vm_configured and .agent_vsock_configured
             and .context_released' \
            <<<"$output" >/dev/null

          tampered_dir="$RUNNER_TEMP/a3s-oci-krun-context-tampered"
          cp -R "$smoke_dir" "$tampered_dir"
          chmod u+w \
            "$tampered_dir/a3s-oci-krun-runtime/libkrun.1.17.0.dylib"
          printf '\0' >> \
            "$tampered_dir/a3s-oci-krun-runtime/libkrun.1.17.0.dylib"
          set +e
          tampered_output="$(
            "$tampered_dir/a3s-oci-krun-shim" context-smoke
          )"
          tampered_status=$?
          set -e
          printf '%s\n' "$tampered_output"
          test "$tampered_status" -eq 2
          jq --exit-status \
            '.status == "unavailable"
             and (.runtime_bundle_loaded | not)
             and (.context_created | not)
             and (.reason | contains("SHA-256 mismatch"))' \
            <<<"$tampered_output" >/dev/null
      - if: runner.os == 'macOS'
        name: Real libkrun guest marker or fail-closed entry
        shell: bash
        run: |
          rootfs_dir="$RUNNER_TEMP/a3s-oci-alpine-aarch64"
          rootfs_archive="$RUNNER_TEMP/alpine-minirootfs-3.22.5-aarch64.tar.gz"
          smoke_dir="$RUNNER_TEMP/a3s-oci-krun-vm"
          console="$RUNNER_TEMP/a3s-oci-krun-vm-console.log"
          mkdir -p "$rootfs_dir" "$smoke_dir"

          curl --fail --location --retry 3 \
            --output "$rootfs_archive" \
            https://dl-cdn.alpinelinux.org/alpine/v3.22/releases/aarch64/alpine-minirootfs-3.22.5-aarch64.tar.gz
          printf '%s  %s\n' \
            '3fbc6285032ed46821b511292633d7b2a6306a2e254f590e92bdafff56cf2f70' \
            "$rootfs_archive" | shasum -a 256 --check
          tar -xzf "$rootfs_archive" -C "$rootfs_dir"

          cp target/debug/a3s-oci-krun-shim "$smoke_dir/"
          cp -R target/debug/a3s-oci-krun-runtime "$smoke_dir/"
          codesign --force --sign - \
            --entitlements packaging/macos/a3s-oci-hvf.entitlements \
            "$smoke_dir/a3s-oci-krun-shim"
          codesign --verify --strict "$smoke_dir/a3s-oci-krun-shim"

          set +e
          output="$(
            "$smoke_dir/a3s-oci-krun-shim" vm-smoke \
              --rootfs "$rootfs_dir" \
              --console "$console"
          )"
          status=$?
          set -e
          printf '%s\n' "$output"

          support="$(sysctl -n kern.hv_support 2>/dev/null || printf unavailable)"
          if [[ "$support" == "1" ]]; then
            test "$status" -eq 0
            jq --exit-status \
              '.platform == "macos" and .status == "available"
               and .runtime_bundle_loaded and .context_created
               and .vm_configured and .rootfs_configured
               and .workload_configured and .console_configured
               and .vm_entered and .guest_exit_code == 0
               and .marker_verified and .marker_removed
               and .console_created' \
              <<<"$output" >/dev/null
          else
            test "$status" -eq 2
            jq --exit-status \
              '.platform == "macos" and .status == "unavailable"
               and .runtime_bundle_loaded and .context_created
               and .vm_configured and .rootfs_configured
               and .workload_configured and .console_configured
               and (.vm_entered | not)
               and (.guest_exit_code == null)
               and (.marker_verified | not)
               and (.marker_removed | not)
               and (.reason | length > 0)' \
              <<<"$output" >/dev/null
          fi

          test -z "$(
            find "$rootfs_dir" -maxdepth 1 \
              -name '.a3s-oci-hvf-vm-smoke-*' -print -quit
          )"
      - if: runner.os == 'Linux'
        name: Native Linux SDK lifecycle without KVM
        run: bash .github/scripts/native-linux-smoke.sh
      - if: runner.os == 'Windows'
        run: cargo run -p a3s-oci-krun --bin a3s-oci-krun-shim -- context-smoke

  native-linux-arm64:
    name: native-linux-lifecycle (aarch64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: bash .github/scripts/native-linux-smoke.sh

  guest-agent-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install --yes musl-tools
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - run: >-
          cargo build -p a3s-oci-agent --release
          --target x86_64-unknown-linux-musl
      - name: Verify static guest artifact
        shell: bash
        run: |
          agent=target/x86_64-unknown-linux-musl/release/a3s-oci-agent
          file "$agent"
          ! readelf --program-headers "$agent" | grep --quiet INTERP
          ! readelf --dynamic "$agent" | grep --quiet NEEDED
