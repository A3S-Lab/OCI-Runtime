name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --all-targets
      - run: cargo run -p a3s-oci-cli -- features
      - if: runner.os == 'Linux'
        name: Native Linux SDK lifecycle without KVM
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes busybox-static
          cargo build -p a3s-oci-agent -p a3s-oci-cli

          bundle="$RUNNER_TEMP/a3s-native-bundle"
          work_parent="$RUNNER_TEMP/a3s-native-work"
          mkdir -p "$bundle/rootfs/bin" "$work_parent"
          cp fixtures/native-linux/config.json "$bundle/config.json"
          cp "$(command -v busybox)" "$bundle/rootfs/bin/busybox"
          ln -s busybox "$bundle/rootfs/bin/sh"

          run_smoke() {
            expected_kvm_present="$1"
            output="$(sudo "$PWD/target/debug/a3s-oci" native-linux-smoke \
              --agent "$PWD/target/debug/a3s-oci-agent" \
              --bundle "$bundle" \
              --work-parent "$work_parent")"
            printf '%s\n' "$output"
            jq --exit-status \
              --argjson expected "$expected_kvm_present" \
              '.status == "available" and .kvm_device_present == $expected' \
              <<<"$output" >/dev/null
          }

          saved_kvm="/dev/a3s-oci-kvm-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          restore_kvm() {
            if [[ -d /dev/kvm ]]; then
              sudo rmdir /dev/kvm
            fi
            if [[ -e "$saved_kvm" || -L "$saved_kvm" ]]; then
              sudo mv "$saved_kvm" /dev/kvm
            fi
          }
          trap restore_kvm EXIT
          if [[ -e /dev/kvm || -L /dev/kvm ]]; then
            sudo mv /dev/kvm "$saved_kvm"
          fi

          run_smoke false
          sudo mkdir /dev/kvm
          run_smoke true
      - if: runner.os == 'Windows'
        run: cargo run -p a3s-oci-krun --bin a3s-oci-krun-shim -- context-smoke

  guest-agent-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install --yes musl-tools
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - run: >-
          cargo build -p a3s-oci-agent --release
          --target x86_64-unknown-linux-musl
      - name: Verify static guest artifact
        shell: bash
        run: |
          agent=target/x86_64-unknown-linux-musl/release/a3s-oci-agent
          file "$agent"
          ! readelf --program-headers "$agent" | grep --quiet INTERP
          ! readelf --dynamic "$agent" | grep --quiet NEEDED
