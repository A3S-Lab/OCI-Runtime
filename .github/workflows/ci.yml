name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --all-targets
      - run: cargo run -p a3s-oci-cli -- features
      - if: runner.os == 'macOS'
        name: Hypervisor.framework VM object lifecycle
        shell: bash
        run: |
          smoke="$RUNNER_TEMP/a3s-oci-hvf-smoke"
          cp target/debug/a3s-oci "$smoke"
          codesign --force --sign - \
            --entitlements packaging/macos/a3s-oci-hvf.entitlements \
            "$smoke"
          codesign --verify --strict "$smoke"

          set +e
          output="$("$smoke" hvf-smoke)"
          status=$?
          set -e
          printf '%s\n' "$output"

          support="$(sysctl -n kern.hv_support 2>/dev/null || printf unavailable)"
          if [[ "$support" == "1" ]]; then
            test "$status" -eq 0
            jq --exit-status \
              '.status == "available" and .vm_created and .vm_destroyed' \
              <<<"$output" >/dev/null
          else
            test "$status" -eq 2
            jq --exit-status \
              '.status == "unavailable" and (.vm_created | not) and (.vm_destroyed | not)' \
              <<<"$output" >/dev/null
          fi
      - if: runner.os == 'Linux'
        name: Native Linux SDK lifecycle without KVM
        run: bash .github/scripts/native-linux-smoke.sh
      - if: runner.os == 'Windows'
        run: cargo run -p a3s-oci-krun --bin a3s-oci-krun-shim -- context-smoke

  native-linux-arm64:
    name: native-linux-lifecycle (aarch64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: bash .github/scripts/native-linux-smoke.sh

  guest-agent-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install --yes musl-tools
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - run: >-
          cargo build -p a3s-oci-agent --release
          --target x86_64-unknown-linux-musl
      - name: Verify static guest artifact
        shell: bash
        run: |
          agent=target/x86_64-unknown-linux-musl/release/a3s-oci-agent
          file "$agent"
          ! readelf --program-headers "$agent" | grep --quiet INTERP
          ! readelf --dynamic "$agent" | grep --quiet NEEDED
